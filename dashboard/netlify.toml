[build]
  base    = "dashboard"
  command = "npm run build"
  publish = "dist"

  [build.environment]
    VITE_API_URL = "http://16.112.121.102:8000/api/v1"

[[redirects]]
  from   = "/api/v1/*"
  to     = "http://16.112.121.102:8000/api/v1/:splat"
  status = 200
  force  = true

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
