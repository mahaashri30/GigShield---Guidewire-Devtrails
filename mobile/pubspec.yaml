name: susanoo
description: AI-Powered Parametric Income Insurance for Delivery Partners
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # State Management
  flutter_riverpod: ^2.5.1
  # HTTP
  dio: ^5.4.3
  # Navigation
  go_router: ^13.2.0
  # Local Storage
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0
  # UI
  cupertino_icons: ^1.0.6
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  video_player: ^2.8.6
  fl_chart: ^0.67.0
  razorpay_flutter: ^1.3.6
  pinput: ^4.0.0
  intl: ^0.19.0
  permission_handler: ^11.3.1
  geolocator: ^12.0.0
  firebase_core: ^3.0.0
  firebase_messaging: ^15.0.0
  flutter_local_notifications: ^21.0.0
  # Camera & Image Processing for Verification
  camera: ^0.11.0
  image_picker: ^1.0.0
  image: ^4.1.0
  # Document scanning (optional, for govt ID auto-crop)
  document_scanner_flutter: ^0.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/susanoo_icon.jpg"
  min_sdk_android: 21
  adaptive_icon_background: "#1A56DB"
  adaptive_icon_foreground: "assets/images/susanoo_icon.jpg"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/lottie/
    - assets/icons/
    - assets/videos/
