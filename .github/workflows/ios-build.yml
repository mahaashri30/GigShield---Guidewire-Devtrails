name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'mobile/**'

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: 'stable'
          cache: true

      - name: Create iOS platform
        working-directory: mobile
        run: flutter create --platforms=ios .

      - name: Flutter pub get
        working-directory: mobile
        run: flutter pub get

      - name: Build iOS no codesign
        working-directory: mobile
        run: |
          flutter build ios --release --no-codesign --dart-define=BASE_URL=http://16.112.121.102:8000/api/v1 --dart-define=ALLOW_INSECURE_HTTP=true

      - name: Package IPA
        working-directory: mobile
        run: |
          mkdir -p build/ios/iphoneos/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/
          cd build/ios/iphoneos
          zip -r ../../../GigShield.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: GigShield-iOS
          path: mobile/GigShield.ipa
          retention-days: 7
